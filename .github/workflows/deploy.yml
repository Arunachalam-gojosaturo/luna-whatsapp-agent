name: Luna AI — Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - bot
          - telegram

jobs:
  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Deploying Luna Backend..."
          railway up --service luna-backend --dockerfile Dockerfile.backend --detach
          echo "Backend deployed!"

  deploy-bot:
    name: Deploy WhatsApp Bot
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'bot' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy WhatsApp Bot to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "Deploying Luna WhatsApp Bot..."
          railway up --service luna-bot --dockerfile Dockerfile.bot --detach
          echo "Bot deployed!"

  deploy-telegram:
    name: Deploy Telegram Bot
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'telegram' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Telegram Bot to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "Deploying Luna Telegram Bot..."
          railway up --service luna-telegram --dockerfile Dockerfile.telegram --detach
          echo "Telegram bot deployed!"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-bot, deploy-telegram]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ]; then
            MSG="Luna AI Deployed Successfully! All services are live on Railway. Commit: ${{ github.sha }}"
          else
            MSG="Luna AI Deploy FAILED! Check GitHub Actions for details. Commit: ${{ github.sha }}"
          fi
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT}" \
            -d text="${MSG}"
